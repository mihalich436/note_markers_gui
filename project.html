<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карты - The Lazy DM's Notes</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="icon" href="./icons/yellow_dragon_sleep.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo">
                <img src="./icons/logo.png" alt="📝 " class="logo-img">
                The Lazy DM's Notes
            </div>
            <div class="user-info">
                <span class="username" id="username"></span>
                <button onclick="logout()" class="logout-btn">Выйти</button>
            </div>
        </div>
        
        <div class="card header">
            <div id="projectInfo">
                <div style="text-align: center;">Загрузка проекта...</div>
            </div>
        </div>
        
        <div class="card"> 
            <!-- <button id="addButton" onclick="showCreateMapModal()" class="add-button">+ Новая карта</button> -->
            
            <div id="mapsList" class="maps-list">
                <div style="text-align: center;">Загрузка карт...</div>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно создания/редактирования заметки -->
    <div id="mapModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="mapModalTitle">Создать карту</h3>
                <button class="close-modal" onclick="closeMapModal()">&times;</button>
            </div>
            <form id="mapForm">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="mapTitle" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="mapDescription" rows="6"></textarea>
                </div>
                <div class="form-group">
                    <label>Ссылка на изображение</label>
                    <input type="text" id="mapImageUrl" title="Прямая ссылка на изображение. Вы можете отправить изображение себе во Вконтакте в виде файла, а затем скопировать прямую ссылку на этот файл сюда.">
                </div>
                <div class="visibility-option">
                    <div class="visibility-label">
                        <span>Видимость карты</span>
                        <small>Если выключено, карта будет скрыта от других участников</small>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="mapVisibility" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <button type="submit">Сохранить</button>
            </form>
        </div>
    </div>

    <!-- Плавающая кнопка создания карты -->
    <button id="addButton" class="fab" onclick="showCreateMapModal()" aria-label="Создать карту">+</button>
    
    <script src="./js/config.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/project.js"></script>
</body>
</html>
