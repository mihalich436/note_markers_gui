<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление доступом - NotesApp</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo">📝 NotesApp</div>
            <div class="user-info">
                <span class="username" id="username"></span>
                <button onclick="logout()" class="logout-btn">Выйти</button>
            </div>
        </div>
        
        <div class="card">
            <button onclick="window.location.href='./projects.html'" class="secondary" style="margin-bottom: 20px; width: auto;">
                ← Назад к проектам
            </button>
            
            <h2>👥 Управление доступом</h2>
            <div id="projectInfo" style="margin-bottom: 20px;"></div>
            
            <!-- Блок приглашения пользователя //> ДОБАВИТЬ КНОПКУ ДЛЯ СОХРАНЕНИЯ, ДОБАВИТЬ ПОЛЕ ДЛЯ НИКА -->
            <div style="margin: 20px 0; padding: 20px; background: #f8f9fa; border-radius: 8px;">
                <h3 style="margin-bottom: 15px;">Пригласить пользователя</h3>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="email" id="inviteEmail" placeholder="Email пользователя" style="flex: 1; min-width: 200px;">
                    <input type="text" id="nickname" placeholder="Ник" title="Ник для обозначения пользователя в проекте" style="flex: 1; min-width: 100px;">
                    <select id="roleSelect" style="padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; background: white;">
                        <option value="READ_ONLY">📖 Только чтение</option>
                        <option value="CHAT">💬 Только заметки</option>
                        <option value="EDITOR">✏️ Редактирование</option>
                        <option value="ADMIN">✨ Мастер</option>
                    </select>
                    <button onclick="addUser()" style="width: auto; background: #28a745;">+ Пригласить</button>
                </div>
                <div id="inviteMessage" style="margin-top: 10px; font-size: 14px; color: #666;"></div>
            </div>
            
            <!-- Список участников -->
            <h3>👥 Участники проекта</h3>
            <div style="overflow-x: auto;">
                <table class="shared-users-table">
                    <thead>
                        <tr>
                            <th>Пользователь</th>
                            <th>Email</th>
                            <th>Ник</th>
                            <th>Роль</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="usersList">
                        <tr><td colspan="4" style="text-align: center;">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="./js/common.js"></script>
    <script src="./js/share.js"></script>
</body>
</html>
